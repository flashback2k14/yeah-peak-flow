<div class="shell">
  <header class="shell-header card">
    <div class="brand">
      <h1>Peak-Flow Monitor</h1>
      <p class="muted">Asthma-Verlauf monatlich dokumentieren</p>
    </div>

    <nav class="nav-links">
      <a
        class="nav-icon-link"
        routerLink="/app/entry"
        routerLinkActive="active"
        title="Erfassung"
        aria-label="Erfassung"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 3h6"></path>
          <path d="M9 21h6"></path>
          <path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
          <path d="M9 8h6"></path>
          <path d="M9 12h6"></path>
          <path d="M9 16h4"></path>
        </svg>
      </a>
      <a
        class="nav-icon-link"
        routerLink="/app/dashboard"
        routerLinkActive="active"
        title="Dashboard"
        aria-label="Dashboard"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19h16"></path>
          <path d="M6 16l4-4 3 3 5-6"></path>
          <path d="M16 9h2v2"></path>
        </svg>
      </a>
      <a
        class="nav-icon-link"
        routerLink="/app/settings"
        routerLinkActive="active"
        title="Einstellungen"
        aria-label="Einstellungen"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.56V21a2 2 0 0 1-4 0v-.09a1.7 1.7 0 0 0-1-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1H3a2 2 0 0 1 0-4h.09a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01a1.7 1.7 0 0 0 1-1.56V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.56h.01a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01a1.7 1.7 0 0 0 1.56 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1z"></path>
        </svg>
      </a>
    </nav>

    <div class="user-actions">
      @if (user(); as user) {
      <span class="muted">{{ user.email }}</span>
      }
      <button class="btn btn-outline" type="button" (click)="logout()">Abmelden</button>
    </div>
  </header>

  <main class="shell-content">
    <router-outlet></router-outlet>
  </main>
</div>
